  <path d="M16 8 Q17 5 16 3" stroke="rgba(255,255,255,0.70)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M20 8 Q19 5 20 3" stroke="rgba(255,255,255,0.55)" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Pot body -->
